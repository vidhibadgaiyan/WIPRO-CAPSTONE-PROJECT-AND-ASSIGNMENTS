spring.application.name=menu-service
server.port=8083
 
# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/menu_db
spring.datasource.username=root
spring.datasource.password=root
 
# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
 
# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
 
# JWT secret \u2014 MUST match the secret in user-service and owner-service exactly
# This is a Base64-encoded 256-bit key
#jwt.secret=YOUR_BASE64_SECRET_HERE
 