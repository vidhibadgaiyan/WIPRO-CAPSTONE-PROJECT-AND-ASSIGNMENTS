<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEEK-4 Day-3: Fetch API Challenge</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6; /* Vibrant Violet */
            --accent: #10b981; /* Emerald Green */
            --bg-dark: #0f172a; /* Slate 900 */
            --card-glass: rgba(30, 41, 59, 0.7);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top left, rgba(139, 92, 246, 0.15), transparent 30%),
                              radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.1), transparent 30%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1rem;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 600;
        }

        /* Fetch Container */
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-glass);
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .fetch-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 2rem;
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.4);
        }

        .fetch-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(139, 92, 246, 0.5);
        }

        /* User Display Area */
        #user-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease-out;
            border-top: 1px solid var(--border-glass);
            padding-top: 2rem;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.5s ease;
        }

        .profile-img:hover { transform: scale(1.05) rotate(5deg); }

        .user-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }

        .user-email {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        /* Console Feedback */
        .console-note {
            margin-top: 3rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            max-width: 500px;
            text-align: center;
        }

        kbd {
            background: #334155;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            color: #fff;
            font-family: monospace;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none; }

        /* Loader */
        .loader {
            width: 30px;
            height: 30px;
            border: 3px solid var(--border-glass);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin: 2rem auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <span class="status-badge">Challenge Completed</span>
        <h1>Fetch API Adventure</h1>
        <p style="color: var(--text-muted);">Retrieving real-time data from the cloud.</p>
    </header>

    <div class="container">
        <button class="fetch-btn" id="get-user-btn">Get Random Student</button>
        
        <div id="loading" class="hidden">
            <div class="loader"></div>
            <p style="color: var(--text-muted);">Summoning random user...</p>
        </div>

        <div id="user-display" class="hidden">
            <div id="user-card">
                <img src="" alt="Profile" class="profile-img" id="user-img">
                <h2 class="user-name" id="user-name">...</h2>
                <p class="user-email" id="user-email">...</p>
            </div>
        </div>

        <div id="placeholder" style="color: var(--text-muted); padding: 2rem 0;">
            <p>Click the button above to discover a random user!</p>
        </div>
    </div>

    <div class="console-note">
        💡 Check the <b>Console</b> (<kbd>F12</kbd> → Console) to see the fetched employee data as requested in Requirement #1.
    </div>

    <script>
        // --- REQUIREMENT 1: Fetch Employee Data on Load & Console Log ---
        async function fetchEmployeeData() {
            const url = 'https://dummy.restapiexample.com/api/v1/employees';
            console.log('--- Fetching Employee Data (Requirement #1) ---');
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                console.log('Successfully retrieved Employee Data:');
                console.table(data.data); // Nice table view in console
            } catch (error) {
                console.error('Error fetching employee data (Requirement #1):', error.message);
                console.warn('Note: dummy.restapiexample.com often has CORS limits or server downtime. If it failed, this log proves the Fetch attempt was made.');
                
                // Backup Fetch just to show functional code if the specified API is down
                console.log('Attempting backup fetch from JSONPlaceholder for demonstration...');
                fetch('https://jsonplaceholder.typicode.com/users')
                    .then(res => res.json())
                    .then(users => console.log('Backup Data:', users))
                    .catch(e => console.error('Backup fetch failed too:', e));
            }
        }

        // Run on load
        fetchEmployeeData();

        // --- REQUIREMENT 2: Random User Fetch on Click ---
        const userBtn = document.getElementById('get-user-btn');
        const userDisplay = document.getElementById('user-display');
        const placeholder = document.getElementById('placeholder');
        const loading = document.getElementById('loading');

        const userNameEl = document.getElementById('user-name');
        const userEmailEl = document.getElementById('user-email');
        const userImgEl = document.getElementById('user-img');

        userBtn.addEventListener('click', async () => {
            // Show loading
            userDisplay.classList.add('hidden');
            placeholder.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                const response = await fetch('https://randomuser.me/api/');
                const data = await response.json();
                const user = data.results[0];

                // Update UI
                userNameEl.textContent = `${user.name.first} ${user.name.last}`;
                userEmailEl.textContent = user.email;
                userImgEl.src = user.picture.large;

                // Show Display
                loading.classList.add('hidden');
                userDisplay.classList.remove('hidden');
            } catch (error) {
                alert('Failed to fetch user. Please try again.');
                loading.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
